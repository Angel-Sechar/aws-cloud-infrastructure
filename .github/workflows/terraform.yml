name: Terraform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Zip Lambda
        run: cd lambda && zip lambda_function.zip lambda_function.py

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color 2>&1 | tee plan.txt
        working-directory: terraform
        env:
          TF_VAR_lambda_role_arn: ${{ secrets.LAMBDA_ROLE_ARN }}
          TF_VAR_eventbridge_role_arn: ${{ secrets.EVENTBRIDGE_ROLE_ARN }}
          TF_VAR_security_group_id: ${{ secrets.SECURITY_GROUP_ID }}
          TF_VAR_ami_id: ${{ secrets.AMI_ID }}
          TF_VAR_key_name: ${{ secrets.KEY_NAME }}
          TF_VAR_sns_email: ${{ secrets.SNS_EMAIL }}
          TF_VAR_owner: ${{ secrets.OWNER }}

      - name: Post Plan as PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '```\n' + plan + '\n```'
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
        working-directory: terraform
        env:
          TF_VAR_lambda_role_arn: ${{ secrets.LAMBDA_ROLE_ARN }}
          TF_VAR_eventbridge_role_arn: ${{ secrets.EVENTBRIDGE_ROLE_ARN }}
          TF_VAR_security_group_id: ${{ secrets.SECURITY_GROUP_ID }}
          TF_VAR_ami_id: ${{ secrets.AMI_ID }}
          TF_VAR_key_name: ${{ secrets.KEY_NAME }}
          TF_VAR_sns_email: ${{ secrets.SNS_EMAIL }}
          TF_VAR_owner: ${{ secrets.OWNER }}
